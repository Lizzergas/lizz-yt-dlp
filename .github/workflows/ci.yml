name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove local SDK overrides
        run: rm -f local.properties

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Read project version
        shell: bash
        run: echo "LIZZ_YTDL_VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_ENV"

      - name: Build and test
        run: ./gradlew check publishAllPublicationsToBuildRepo

      - name: Smoke test published artifacts
        run: ./gradlew -p smoke-tests/kmp-consumer compileKotlinJvm -PlizzYtdlVersion=${{ env.LIZZ_YTDL_VERSION }} -PlizzYtdlRepoPath=${{ github.workspace }}/build/repo
