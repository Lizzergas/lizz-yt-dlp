name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove local SDK overrides
        run: rm -f local.properties

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check publishAllPublicationsToBuildRepo

      - name: Smoke test published artifacts
        run: ./gradlew -p smoke-tests/kmp-consumer compileKotlinJvm -PlizzYtdlVersion=0.1.0-alpha01 -PlizzYtdlRepoPath=${{ github.workspace }}/build/repo
